<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Backrooms - Optimized Light</title>
    <style>
        body { margin: 0; overflow: hidden; background: #bdb58d; touch-action: none; -webkit-user-select: none; }
        #vhs-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 100; }
        .scanlines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 1px, transparent 2px, transparent 4px); opacity: 0.4; }
        .noise { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.1; animation: grain 0.1s steps(2) infinite; }
        @keyframes grain { 0% { transform: translate(0,0); } 50% { transform: translate(-1%, -1%); } 100% { transform: translate(1%, 1%); } }
        .vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.4) 150%); z-index: 106; }
        #ui { position: absolute; bottom: 20px; left: 20px; color: #eee; font-family: 'Courier New', Courier, monospace; font-size: 12px; text-shadow: 1px 1px #000; z-index: 110; opacity: 0.8; pointer-events: none; }
        canvas { filter: contrast(1.1) saturate(1.1) blur(0.3px); cursor: crosshair; }
        #move-zone { position: absolute; bottom: 0; left: 0; width: 50%; height: 100%; z-index: 200; }
        #look-zone { position: absolute; bottom: 0; right: 0; width: 50%; height: 100%; z-index: 200; }
        #joystick-container { position: absolute; width: 100px; height: 100px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 50%; display: none; z-index: 210; pointer-events: none; }
        #joystick-knob { position: absolute; top: 30px; left: 30px; width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 50%; }
        #sprint-btn { 
            position: absolute; bottom: 40px; right: 40px; width: 70px; height: 70px; 
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); 
            border-radius: 50%; color: white; font-family: sans-serif; font-weight: bold;
            display: flex; align-items: center; justify-content: center; 
            z-index: 300; font-size: 12px; -webkit-tap-highlight-color: transparent;
        }
        #sprint-btn.active { background: rgba(255,255,255,0.4); transform: scale(0.9); }
    </style>
</head>
<body>
    <div id="ui">[REC]  ▶<br>ASYNC RESEARCH<br>JUL. 04 1991</div>
    <div id="vhs-container"><div class="scanlines"></div><div class="noise"></div><div class="vignette"></div></div>
    <div id="move-zone"></div><div id="look-zone"></div>
    <div id="sprint-btn">RUN</div>
    <div id="joystick-container"><div id="joystick-knob"></div></div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const TILE_SIZE = 5;
        const VIEW_DISTANCE = 6;
        const mapData = new Map();
        const flickerList = [];
        const scene = new THREE.Scene();
        const fogColor = 0x9e956b;
        scene.fog = new THREE.Fog(fogColor, 1, 25);
        scene.background = new THREE.Color(fogColor);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 50);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio > 1 ? 1 : 0.8); 
        document.body.appendChild(renderer.domElement);

        // ライトを1つに集約（明るさは高めに設定）
        const ambientLight = new THREE.AmbientLight(0xfff5d1, 2.2);
        scene.add(ambientLight); 

        const wallMat = new THREE.MeshLambertMaterial({ color: 0xd6cc91 });
        const floorMat = new THREE.MeshLambertMaterial({ color: 0xc4bc8b });
        const ceilingMat = new THREE.MeshLambertMaterial({ color: 0xd6cc91 });

        const player = { 
            pos: new THREE.Vector3(0, 1.6, 0), 
            rot: new THREE.Euler(0, 0, 0, 'YXZ'), 
            sway: { x: 0, y: 0, z: 0 },
            isSprinting: false
        };

        const keys = { w: false, a: false, s: false, d: false, shift: false };
        const input = { moveX: 0, moveY: 0, lookId: null, moveId: null, lastX: 0, lastY: 0, joyDist: 0, btnSprint: false };

        window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; if(e.key === 'Shift') keys.shift = true; });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; if(e.key === 'Shift') keys.shift = false; });

        document.addEventListener('click', (e) => { if(e.target.id !== 'sprint-btn' && !('ontouchstart' in window)) renderer.domElement.requestPointerLock(); });
        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement === renderer.domElement) {
                player.rot.y -= e.movementX * 0.002;
                player.rot.x = Math.max(-1.4, Math.min(1.4, player.rot.x - e.movementY * 0.002));
            }
        });

        const sprintBtn = document.getElementById('sprint-btn');
        const joyCont = document.getElementById('joystick-container');
        const joyKnob = document.getElementById('joystick-knob');
        const setSprint = (val) => { input.btnSprint = val; val ? sprintBtn.classList.add('active') : sprintBtn.classList.remove('active'); };
        
        sprintBtn.addEventListener('touchstart', (e) => { e.preventDefault(); setSprint(true); });
        sprintBtn.addEventListener('touchend', () => setSprint(false));
        sprintBtn.addEventListener('mousedown', () => setSprint(true));
        sprintBtn.addEventListener('mouseup', () => setSprint(false));

        document.getElementById('move-zone').addEventListener('touchstart', e => {
            const t = e.changedTouches[0]; input.moveId = t.identifier;
            joyCont.style.display = 'block'; joyCont.style.left = (t.clientX - 50) + 'px'; joyCont.style.top = (t.clientY - 50) + 'px';
        });
        document.getElementById('move-zone').addEventListener('touchmove', e => {
            for (let t of e.changedTouches) if (t.identifier === input.moveId) {
                const r = joyCont.getBoundingClientRect();
                const dx = t.clientX - (r.left + 50), dy = t.clientY - (r.top + 50);
                input.joyDist = Math.sqrt(dx*dx + dy*dy);
                const angle = Math.atan2(dy, dx), limit = Math.min(input.joyDist, 40);
                input.moveX = (limit * Math.cos(angle)) / 40; input.moveY = (limit * Math.sin(angle)) / 40;
                joyKnob.style.transform = `translate(${input.moveX * 30}px, ${input.moveY * 30}px)`;
            }
        });
        document.getElementById('move-zone').addEventListener('touchend', () => { input.moveId = null; input.moveX = input.moveY = 0; input.joyDist = 0; joyCont.style.display = 'none'; });

        document.getElementById('look-zone').addEventListener('touchstart', e => {
            const t = e.changedTouches[0]; input.lookId = t.identifier; input.lastX = t.clientX; input.lastY = t.clientY;
        });
        document.getElementById('look-zone').addEventListener('touchmove', e => {
            for (let t of e.changedTouches) if (t.identifier === input.lookId) {
                player.rot.y -= (t.clientX - input.lastX) * 0.005;
                player.rot.x = Math.max(-1.4, Math.min(1.4, player.rot.x - (t.clientY - input.lastY) * 0.005));
                input.lastX = t.clientX; input.lastY = t.clientY;
            }
        });

        function seededRandom(x, z) { return (Math.abs(Math.sin(x * 12345 + z * 67890) * 10000) % 1); }

        function createTile(tx, tz) {
            const group = new THREE.Group();
            group.add(new THREE.Mesh(new THREE.PlaneGeometry(TILE_SIZE, TILE_SIZE), floorMat).rotateX(-Math.PI/2));
            const ceil = new THREE.Mesh(new THREE.PlaneGeometry(TILE_SIZE, TILE_SIZE), ceilingMat).rotateX(Math.PI/2);
            ceil.position.y = 3; group.add(ceil);
            
            const r = seededRandom(tx + 100, tz + 100);
            // 物理的なライト（PointLight）は作らず、マテリアルの発光のみ設定
            const lampMat = new THREE.MeshStandardMaterial({ 
                color: 0x222222, 
                emissive: (r > 0.95) ? 0x222211 : 0xffffff, 
                emissiveIntensity: (r > 0.95) ? 0.2 : 2.5 
            });
            const lamp = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.05, 0.6), lampMat);
            lamp.position.set(0, 2.98, 0); group.add(lamp);
            
            if (r > 0.85 && r <= 0.95) flickerList.push({ mesh: lamp, offset: r * 20 });
            
            const walls = [];
            if (Math.abs(tx) > 1 || Math.abs(tz) > 1) {
                [[0, 1.5, 2.5, 5, 3, 0.4], [2.5, 1.5, 0, 0.4, 3, 5]].forEach((c, i) => {
                    if (seededRandom(tx + (i?5:0), tz + (i?0:5)) > 0.68) {
                        const wall = new THREE.Mesh(new THREE.BoxGeometry(c[3], c[4], c[5]), wallMat);
                        wall.position.set(c[0], c[1], c[2]); group.add(wall);
                        walls.push(new THREE.Box3().setFromObject(wall).translate(new THREE.Vector3(tx*TILE_SIZE, 0, tz*TILE_SIZE)));
                    }
                });
            }
            group.position.set(tx * TILE_SIZE, 0, tz * TILE_SIZE);
            return { mesh: group, walls: walls };
        }

        function updateMap() {
            const px = Math.floor((player.pos.x + TILE_SIZE/2) / TILE_SIZE), pz = Math.floor((player.pos.z + TILE_SIZE/2) / TILE_SIZE);
            for (let x = px-VIEW_DISTANCE; x <= px+VIEW_DISTANCE; x++) {
                for (let z = pz-VIEW_DISTANCE; z <= pz+VIEW_DISTANCE; z++) {
                    const key = `${x},${z}`;
                    if (!mapData.has(key)) { const t = createTile(x, z); mapData.set(key, t); scene.add(t.mesh); }
                    else { scene.add(mapData.get(key).mesh); }
                }
            }
            mapData.forEach((t, k) => {
                const [tx, tz] = k.split(',').map(Number);
                if (Math.abs(tx-px) > VIEW_DISTANCE || Math.abs(tz-pz) > VIEW_DISTANCE) {
                    scene.remove(t.mesh);
                    for(let i=flickerList.length-1; i>=0; i--) if(flickerList[i].mesh.parent===t.mesh) flickerList.splice(i,1);
                }
            });
        }

        function checkCollision(box) {
            for (let t of mapData.values()) if (t.mesh.parent === scene) for (let w of t.walls) if (box.intersectsBox(w)) return true;
            return false;
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;
            flickerList.forEach(l => l.mesh.material.emissiveIntensity = ((Math.sin(time * 50 + l.offset) * Math.cos(time * 15)) > -0.2) ? 2.5 : 0.2);

            let mx = input.moveX, mz = input.moveY;
            if (keys.w) mz = -1; if (keys.s) mz = 1; if (keys.a) mx = -1; if (keys.d) mx = 1;
            player.isSprinting = keys.shift || input.btnSprint || input.joyDist > 55;
            const speed = player.isSprinting ? 0.14 : 0.07;

            if (Math.abs(mx) > 0.01 || Math.abs(mz) > 0.01) {
                const dir = new THREE.Vector3(mx, 0, mz).normalize().applyEuler(new THREE.Euler(0, player.rot.y, 0));
                
                const nextX = player.pos.x + dir.x * speed;
                const boxX = new THREE.Box3(new THREE.Vector3(nextX-0.3, 0.1, player.pos.z-0.3), new THREE.Vector3(nextX+0.3, 2.5, player.pos.z+0.3));
                if (!checkCollision(boxX)) player.pos.x = nextX;

                const nextZ = player.pos.z + dir.z * speed;
                const boxZ = new THREE.Box3(new THREE.Vector3(player.pos.x-0.3, 0.1, nextZ-0.3), new THREE.Vector3(player.pos.x+0.3, 2.5, nextZ+0.3));
                if (!checkCollision(boxZ)) player.pos.z = nextZ;

                const bob = player.isSprinting ? 18 : 12;
                player.pos.y = 1.6 + Math.sin(time * bob) * (player.isSprinting ? 0.06 : 0.025);
                player.sway.z = Math.sin(time * (bob/2)) * (player.isSprinting ? 0.04 : 0.01);
            } else { player.pos.y = 1.6 + Math.sin(time * 2) * 0.008; player.sway.z *= 0.9; }

            player.sway.x = Math.sin(time * 1.5) * 0.005; player.sway.y = Math.cos(time * 1.2) * 0.005;
            camera.position.copy(player.pos);
            camera.quaternion.setFromEuler(new THREE.Euler(player.rot.x + player.sway.x, player.rot.y + player.sway.y, player.sway.z, 'YXZ'));
            
            updateMap();
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
