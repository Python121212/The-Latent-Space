<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Backrooms - Full Controls</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; user-select: none; }
        canvas { display: block; }

        /* スタート画面 */
        #lock-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); color: #eee; 
            display: flex; align-items: center; justify-content: center; z-index: 9999; cursor: pointer;
        }

        /* ステータス */
        #stats { position: absolute; top: 15px; left: 15px; color: #fff; font-size: 12px; pointer-events: none; z-index: 100; }
        #stamina-bar { width: 100px; height: 4px; background: rgba(255,255,255,0.1); margin-top: 5px; }
        #stamina-fill { width: 100%; height: 100%; background: #ffeb3b; }

        /* モバイル操作パネル */
        #mobile-ui { position: absolute; inset: 0; pointer-events: none; z-index: 200; }
        
        /* 左：ジョイスティック */
        .joy-container { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; pointer-events: auto; }
        #joystick-base { width: 100%; height: 100%; background: rgba(255,255,255,0.08); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); }
        #joystick-stick { width: 50px; height: 50px; background: rgba(255,255,255,0.3); border-radius: 50%; }

        /* 右：アクションボタン群 */
        .action-group { position: absolute; bottom: 30px; right: 30px; width: 220px; height: 220px; pointer-events: none; }
        .btn { 
            position: absolute; pointer-events: auto; display: flex; align-items: center; justify-content: center; 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; 
            border-radius: 50%; font-weight: bold; font-size: 14px; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: rgba(255,255,255,0.4); transform: scale(0.9); }

        #btn-jump { bottom: 85px; right: 85px; width: 85px; height: 85px; font-size: 16px; background: rgba(255,255,255,0.2); }
        #btn-q { bottom: 140px; right: 0; width: 65px; height: 65px; }
        #btn-e { bottom: 0; right: 140px; width: 65px; height: 65px; }
        #btn-shift { bottom: 0; right: 0; width: 80px; height: 80px; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="lock-overlay" onclick="renderer.domElement.requestPointerLock()">
        <div style="text-align:center"><h1>THE BACKROOMS</h1><p>TOUCH TO START</p></div>
    </div>

    <div id="stats">LVL 0<div id="stamina-bar"><div id="stamina-fill"></div></div></div>

    <div id="mobile-ui">
        <div class="joy-container"><div id="joystick-base"><div id="joystick-stick"></div></div></div>
        <div class="action-group">
            <div id="btn-jump" class="btn">JUMP</div>
            <div id="btn-q" class="btn">Q</div>
            <div id="btn-e" class="btn">E</div>
            <div id="btn-shift" class="btn">RUN</div>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a05);
        scene.fog = new THREE.Fog(0x0a0a05, 1, 12);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 20);
        camera.rotation.order = 'YXZ';
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);
        window.renderer = renderer;

        const player = { pos: new THREE.Vector3(0, 0, 0), rot: { x: 0, y: 0 }, stamina: 100, currentSpeed: 0, bobTimer: 0, velY: 0, isGrounded: true, lean: 0 };
        const keys = {};

        // マテリアル
        const wallMat = new THREE.MeshBasicMaterial({ color: 0x8a825d });
        const floorMat = new THREE.MeshBasicMaterial({ color: 0x7a724d });
        const ceilMat = new THREE.MeshBasicMaterial({ color: 0x9a926d });

        // ポインターロック管理
        document.addEventListener('pointerlockchange', () => {
            document.getElementById('lock-overlay').style.display = (document.pointerLockElement === renderer.domElement) ? 'none' : 'flex';
        });

        // --- 入力処理 ---
        const setupBtn = (id, key, callback) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; if(callback) callback(); }, {passive:false});
            el.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; }, {passive:false});
        };

        function doJump() { if(player.isGrounded) player.velY = 0.12; }

        setupBtn('btn-q', 'q');
        setupBtn('btn-e', 'e');
        setupBtn('btn-shift', 'shift');
        setupBtn('btn-jump', ' ', doJump);

        window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if(e.key === ' ') doJump(); });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // マウス移動
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement) {
                player.rot.y -= e.movementX * 0.002;
                player.rot.x = Math.max(-1.4, Math.min(1.4, player.rot.x - e.movementY * 0.002));
            }
        });

        // スマホ視点移動
        let lookId = null, lX, lY;
        renderer.domElement.addEventListener('touchstart', e => {
            for(let t of e.changedTouches) {
                if(t.pageX > window.innerWidth / 2 && lookId === null) { lookId = t.identifier; lX = t.pageX; lY = t.pageY; }
            }
        });
        window.addEventListener('touchmove', e => {
            for(let t of e.changedTouches) {
                if(t.identifier === lookId) {
                    player.rot.y -= (t.pageX - lX) * 0.006;
                    player.rot.x = Math.max(-1.4, Math.min(1.4, player.rot.x - (t.pageY - lY) * 0.006));
                    lX = t.pageX; lY = t.pageY;
                }
            }
        }, { passive: false });
        window.addEventListener('touchend', e => {
            for(let t of e.changedTouches) if(t.identifier === lookId) lookId = null;
        });

        // ジョイスティック
        let jActive = false, jTouchId = null, jInput = { x: 0, z: 0 };
        const jStick = document.getElementById('joystick-stick'), jBase = document.getElementById('joystick-base');
        jBase.addEventListener('touchstart', e => { e.preventDefault(); jActive = true; jTouchId = e.changedTouches[0].identifier; }, {passive:false});
        window.addEventListener('touchmove', e => {
            for(let t of e.changedTouches) {
                if(jActive && t.identifier === jTouchId) {
                    const r = jBase.getBoundingClientRect();
                    const dx = t.clientX - (r.left + r.width/2), dy = t.clientY - (r.top + r.height/2);
                    const d = Math.min(r.width/2, Math.sqrt(dx*dx+dy*dy)), a = Math.atan2(dy,dx);
                    jStick.style.transform = `translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)`;
                    jInput.x = (Math.cos(a)*d)/(r.width/2); jInput.z = (Math.sin(a)*d)/(r.height/2);
                    e.preventDefault();
                }
            }
        }, { passive: false });
        window.addEventListener('touchend', e => {
            for(let t of e.changedTouches) if(t.identifier === jTouchId) { jActive = false; jInput = {x:0,z:0}; jStick.style.transform = ''; }
        });

        // --- マップ生成 ---
        const mapData = new Map();
        function createTile(tx, tz) {
            const group = new THREE.Group();
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(5.05, 5.05), floorMat);
            floor.rotation.x = -Math.PI/2;
            group.add(floor);
            const ceil = new THREE.Mesh(new THREE.PlaneGeometry(5.05, 5.05), ceilMat);
            ceil.rotation.x = Math.PI/2; ceil.position.y = 3;
            group.add(ceil);

            const walls = [];
            const seed = Math.sin(tx * 12.98 + tz * 78.23) * 43758.54;
            if (seed - Math.floor(seed) > 0.75 && (Math.abs(tx) > 1 || Math.abs(tz) > 1)) {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(5, 3, 0.5), wallMat);
                wall.position.set(0, 1.5, 2.25);
                group.add(wall);
                const wallBox = new THREE.Box3().setFromObject(wall);
                wallBox.translate(new THREE.Vector3(tx*5, 0, tz*5));
                walls.push(wallBox);
            }
            group.position.set(tx * 5, 0, tz * 5);
            scene.add(group);
            return { mesh: group, walls };
        }

        function animate() {
            requestAnimationFrame(animate);

            // 物理
            player.pos.y += player.velY;
            if (player.pos.y > 0) { player.velY -= 0.007; player.isGrounded = false; }
            else { player.pos.y = 0; player.velY = 0; player.isGrounded = true; }

            // 移動
            const mx = (keys['d']?1:0) - (keys['a']?1:0) + jInput.x;
            const mz = (keys['s']?1:0) - (keys['w']?1:0) + jInput.z;
            const isMoving = Math.abs(mx) > 0.1 || Math.abs(mz) > 0.1;
            
            if (keys['shift'] && player.stamina > 0 && isMoving) {
                player.stamina -= 0.8; player.currentSpeed = 0.13;
            } else {
                player.stamina = Math.min(100, player.stamina + 0.5);
                player.currentSpeed = isMoving ? 0.08 : 0;
            }
            document.getElementById('stamina-fill').style.width = player.stamina + '%';

            if (isMoving) {
                const moveDir = new THREE.Vector3(mx, 0, mz).normalize().applyEuler(new THREE.Euler(0, player.rot.y, 0));
                const nextX = player.pos.x + moveDir.x * player.currentSpeed;
                const nextZ = player.pos.z + moveDir.z * player.currentSpeed;
                
                let colX = false, colZ = false;
                const tx = Math.round(player.pos.x/5), tz = Math.round(player.pos.z/5);
                for(let x = tx-1; x <= tx+1; x++) for(let z = tz-1; z <= tz+1; z++) {
                    const tile = mapData.get(`${x},${z}`);
                    if(tile) tile.walls.forEach(box => {
                        if(box.intersectsSphere(new THREE.Sphere(new THREE.Vector3(nextX, 1, player.pos.z), 0.4))) colX = true;
                        if(box.intersectsSphere(new THREE.Sphere(new THREE.Vector3(player.pos.x, 1, nextZ), 0.4))) colZ = true;
                    });
                }
                if(!colX) player.pos.x = nextX;
                if(!colZ) player.pos.z = nextZ;
                player.bobTimer += player.currentSpeed * 4;
            }

            // リーン（Q/E）
            const targetLean = (keys['e'] ? 1 : 0) - (keys['q'] ? 1 : 0);
            player.lean += (targetLean - player.lean) * 0.1;

            // カメラ
            camera.position.set(player.pos.x, 1.6 + player.pos.y + Math.sin(player.bobTimer)*0.05, player.pos.z);
            // リーンを横移動にも反映
            const leanOffset = new THREE.Vector3(player.lean * 0.6, 0, 0).applyEuler(new THREE.Euler(0, player.rot.y, 0));
            camera.position.add(leanOffset);
            camera.rotation.set(player.rot.x, player.rot.y, -player.lean * 0.15);

            // 生成
            const curTX = Math.round(player.pos.x / 5), curTZ = Math.round(player.pos.z / 5);
            for (let x = curTX - 5; x <= curTX + 5; x++) for (let z = curTZ - 5; z <= curTZ + 5; z++) {
                if (!mapData.has(`${x},${z}`)) mapData.set(`${x},${z}`, createTile(x, z));
            }

            renderer.render(scene, camera);
        }
        animate();
        window.onresize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    </script>
</body>
</html>
