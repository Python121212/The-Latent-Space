<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Backrooms - Mouse Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; user-select: none; }
        canvas { display: block; cursor: crosshair; }
        
        #lock-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); color: #fff; 
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; cursor: pointer; text-align: center;
        }
        #stats { position: absolute; top: 15px; left: 15px; color: #fff; font-size: 12px; pointer-events: none; z-index: 100; }
        #stamina-bar { width: 100px; height: 4px; background: rgba(255,255,255,0.1); margin-top: 5px; }
        #stamina-fill { width: 100%; height: 100%; background: #ffeb3b; }

        /* モバイルUI（PCでは自動で隠れますが念のため） */
        #mobile-ui { position: absolute; inset: 0; pointer-events: none; z-index: 200; }
        .joy-container { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; pointer-events: auto; }
        #joystick-base { width: 100%; height: 100%; background: rgba(255,255,255,0.08); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        #joystick-stick { width: 50px; height: 50px; background: rgba(255,255,255,0.3); border-radius: 50%; }
        .action-group { position: absolute; bottom: 30px; right: 30px; width: 200px; height: 200px; pointer-events: none; }
        .btn { position: absolute; pointer-events: auto; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; border-radius: 50%; font-weight: bold; }
        #btn-jump { bottom: 80px; right: 80px; width: 80px; height: 80px; }
        #btn-shift { bottom: 0; right: 0; width: 80px; height: 80px; border-radius: 15px; }
    </style>
</head>
<body>
    <div id="lock-overlay">
        <div>
            <h1 style="margin:0;">THE BACKROOMS</h1>
            <p>CLICK TO START / MOVE MOUSE TO LOOK</p>
        </div>
    </div>

    <div id="stats">LVL 0<div id="stamina-bar"><div id="stamina-fill"></div></div></div>
    <div id="mobile-ui">
        <div class="joy-container"><div id="joystick-base"><div id="joystick-stick"></div></div></div>
        <div class="action-group">
            <div id="btn-jump" class="btn">JUMP</div>
            <div id="btn-shift" class="btn">RUN</div>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050500);
        scene.fog = new THREE.Fog(0x050500, 1, 15);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 20);
        camera.rotation.order = 'YXZ';
        
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setPixelRatio(window.devicePixelRatio); 
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const player = { pos: new THREE.Vector3(0, 0, 0), rot: { x: 0, y: 0 }, stamina: 100, currentSpeed: 0, bobTimer: 0, velY: 0, isGrounded: true };
        const keys = {};

        // --- マウス・ポインターロック修正 ---
        const overlay = document.getElementById('lock-overlay');
        
        // 画面クリックでロック開始
        overlay.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === renderer.domElement) {
                overlay.style.display = 'none';
            } else {
                overlay.style.display = 'flex';
            }
        });

        // マウス移動イベント
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement) {
                // 感度の調整 (0.002)
                player.rot.y -= e.movementX * 0.002;
                player.rot.x -= e.movementY * 0.002;
                // 上下の角度制限
                player.rot.x = Math.max(-1.5, Math.min(1.5, player.rot.x));
            }
        });

        // --- その他基本処理 ---
        const wallMat = new THREE.MeshBasicMaterial({ color: 0x8a825d });
        const floorMat = new THREE.MeshBasicMaterial({ color: 0x7a724d });

        window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

        function animate() {
            requestAnimationFrame(animate);

            // 移動計算
            const mx = (keys['d']?1:0) - (keys['a']?1:0);
            const mz = (keys['s']?1:0) - (keys['w']?1:0);
            const isMoving = Math.abs(mx) > 0 || Math.abs(mz) > 0;
            const isSprinting = keys['shift'] && player.stamina > 0 && isMoving;
            
            player.stamina = Math.max(0, Math.min(100, player.stamina + (isSprinting ? -1.0 : 0.5)));
            document.getElementById('stamina-fill').style.width = player.stamina + '%';

            const speed = isSprinting ? 0.12 : 0.07;
            if (isMoving) {
                const moveDir = new THREE.Vector3(mx, 0, mz).normalize().applyEuler(new THREE.Euler(0, player.rot.y, 0));
                player.pos.addScaledVector(moveDir, speed);
                player.bobTimer += speed * 3;
            }

            // カメラ更新
            camera.position.set(player.pos.x, 1.6 + Math.sin(player.bobTimer) * 0.05, player.pos.z);
            camera.rotation.set(player.rot.x, player.rot.y, 0);

            // 簡易床生成
            const ptx = Math.round(player.pos.x/5), ptz = Math.round(player.pos.z/5);
            if (!scene.getObjectByName(`${ptx},${ptz}`)) {
                const floor = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), floorMat);
                floor.rotation.x = -Math.PI/2;
                floor.name = `${ptx},${ptz}`;
                scene.add(floor);
            }

            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
