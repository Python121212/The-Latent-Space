<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Backrooms - Mobile Joystick Update</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a10; touch-action: none; font-family: sans-serif; }
        canvas { display: block; image-rendering: pixelated; }
        #ui { position: absolute; top: 10px; left: 10px; color: #fff; font-size: 12px; pointer-events: none; text-shadow: 1px 1px #000; z-index: 10; }
        #stamina-bar { width: 120px; height: 6px; background: rgba(0,0,0,0.5); border: 1px solid #444; margin-top: 5px; }
        #stamina-fill { width: 100%; height: 100%; background: #eee; transition: background 0.3s; }
        
        /* ジョイスティック */
        #joystick-base { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); z-index: 20; }
        #joystick-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: rgba(255,255,255,0.4); border-radius: 50%; }

        /* 右側アクションボタン */
        .action-btns { position: absolute; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 15px; align-items: flex-end; z-index: 20; }
        .btn { width: 60px; height: 60px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; font-size: 14px; }
        .btn:active { background: rgba(255,255,255,0.4); }
        #btn-shift { width: 80px; height: 80px; border-radius: 15px; background: rgba(255,255,0,0.1); }
        .lean-row { display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div id="ui">LEVEL 0<div id="stamina-bar"><div id="stamina-fill"></div></div></div>
    
    <div id="joystick-base"><div id="joystick-stick"></div></div>

    <div class="action-btns">
        <div class="lean-row">
            <div id="btn-q" class="btn">Q</div>
            <div id="btn-e" class="btn">E</div>
        </div>
        <div id="btn-shift" class="btn">RUN</div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module">
        import * as THREE from 'three';

        const TILE_SIZE = 5;
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a10);
        scene.fog = new THREE.Fog(0x1a1a10, 1, 15);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 25);
        camera.rotation.order = 'YXZ';
        
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setPixelRatio(window.devicePixelRatio > 1 ? 0.5 : 1); 
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const wallMat = new THREE.MeshBasicMaterial({ color: 0x8a825d });
        const floorMat = new THREE.MeshBasicMaterial({ color: 0x7a724d });

        const player = { 
            pos: new THREE.Vector3(0, 0, 0), rot: { x: 0, y: 0 },
            stamina: 100, isExhausted: false,
            currentSpeed: 0, bobTimer: 0, lean: 0,
            inputMove: { x: 0, z: 0 }
        };
        const keys = {};

        // ジョイスティック処理
        const jBase = document.getElementById('joystick-base');
        const jStick = document.getElementById('joystick-stick');
        let jActive = false;

        const handleMove = (e) => {
            if(!jActive) return;
            const touch = e.touches ? e.touches[0] : e;
            const rect = jBase.getBoundingClientRect();
            const centerX = rect.left + rect.width/2;
            const centerY = rect.top + rect.height/2;
            let dx = touch.clientX - centerX, dy = touch.clientY - centerY;
            const dist = Math.min(50, Math.sqrt(dx*dx + dy*dy));
            const angle = Math.atan2(dy, dx);
            
            const lx = Math.cos(angle) * dist, ly = Math.sin(angle) * dist;
            jStick.style.transform = `translate(${lx}px, ${ly}px)`;
            
            player.inputMove.x = lx / 50;
            player.inputMove.z = ly / 50;
        };

        const stopMove = () => {
            jActive = false;
            jStick.style.transform = `translate(0,0)`;
            player.inputMove = { x: 0, z: 0 };
        };

        jBase.addEventListener('touchstart', (e) => { jActive = true; handleMove(e); }, {passive:false});
        window.addEventListener('touchmove', handleMove, {passive:false});
        window.addEventListener('touchend', stopMove);

        // ボタン処理
        const setupBtn = (id, key) => {
            const el = document.getElementById(id);
            el.ontouchstart = (e) => { e.preventDefault(); keys[key] = true; };
            el.ontouchend = () => keys[key] = false;
        };
        setupBtn('btn-q', 'q'); setupBtn('btn-e', 'e'); setupBtn('btn-shift', 'shift');

        // 視点操作
        let lastX, lastY;
        window.ontouchstart = e => { if(!jActive){ lastX = e.touches[0].pageX; lastY = e.touches[0].pageY; }};
        window.ontouchmove = e => {
            if(jActive || e.touches.length > 1) return;
            const dx = e.touches[0].pageX - lastX, dy = e.touches[0].pageY - lastY;
            player.rot.y -= dx * 0.005;
            player.rot.x = Math.max(-1.4, Math.min(1.4, player.rot.x - dy * 0.005));
            lastX = e.touches[0].pageX; lastY = e.touches[0].pageY;
        };

        // マップ・タイル生成（省略・既存ロジック）
        const mapData = new Map();
        function createTile(tx, tz) {
            const group = new THREE.Group();
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(TILE_SIZE, TILE_SIZE), floorMat);
            floor.rotation.x = -Math.PI/2; group.add(floor);
            const ceil = new THREE.Mesh(new THREE.PlaneGeometry(TILE_SIZE, TILE_SIZE), floorMat);
            ceil.rotation.x = Math.PI/2; ceil.position.y = 3; group.add(ceil);
            const walls = [];
            if (Math.abs(tx) > 1 || Math.abs(tz) > 1) {
                if (Math.sin(tx*3+tz*5) > 0.6) {
                    const w = new THREE.Mesh(new THREE.BoxGeometry(5, 3, 0.2), wallMat);
                    w.position.set(0, 1.5, 2.5); group.add(w);
                    walls.push(new THREE.Box3().setFromObject(w).translate(new THREE.Vector3(tx*TILE_SIZE, 0, tz*TILE_SIZE)));
                }
            }
            group.position.set(tx * TILE_SIZE, 0, tz * TILE_SIZE);
            return { mesh: group, walls };
        }

        function animate() {
            requestAnimationFrame(animate);

            // スタミナ管理（30%回復まで強制歩行）
            if (player.stamina <= 0) player.isExhausted = true;
            if (player.stamina >= 30) player.isExhausted = false;

            const isMoving = Math.abs(player.inputMove.x) > 0.1 || Math.abs(player.inputMove.z) > 0.1;
            const isSprinting = keys['shift'] && !player.isExhausted && isMoving;
            
            player.stamina = Math.max(0, Math.min(100, player.stamina + (isSprinting ? -1.2 : 0.6)));
            const sFill = document.getElementById('stamina-fill');
            sFill.style.width = player.stamina + '%';
            sFill.style.background = player.isExhausted ? '#ff3333' : '#eee';

            // 移動速度
            const targetSpeed = isMoving ? (isSprinting ? 0.14 : 0.07) : 0;
            player.currentSpeed += (targetSpeed - player.currentSpeed) * 0.1;

            if (player.currentSpeed > 0.001) {
                const dir = new THREE.Vector3(player.inputMove.x, 0, player.inputMove.z).normalize().applyEuler(new THREE.Euler(0, player.rot.y, 0));
                ['x', 'z'].forEach(axis => {
                    const next = player.pos[axis] + dir[axis] * player.currentSpeed;
                    // 衝突判定省略（簡易版）
                    player.pos[axis] = next;
                });
                player.bobTimer += player.currentSpeed * 2.5;
            }

            // リーン & カメラ適用
            const targetLean = (keys['e']?1:0) - (keys['q']?1:0);
            player.lean += (targetLean - player.lean) * 0.1;

            const bobY = Math.sin(player.bobTimer) * player.currentSpeed * 0.5;
            camera.position.set(player.pos.x, 1.5 + bobY, player.pos.z);
            // リーン時の横移動
            const leanDir = new THREE.Vector3(player.lean * 0.6, 0, 0).applyEuler(new THREE.Euler(0, player.rot.y, 0));
            camera.position.add(leanDir);
            camera.rotation.set(player.rot.x, player.rot.y, -player.lean * 0.15);

            // マップ更新
            const tx = Math.round(player.pos.x / TILE_SIZE), tz = Math.round(player.pos.z / TILE_SIZE);
            for(let x=tx-2; x<=tx+2; x++) for(let z=tz-2; z<=tz+2; z++) {
                if(!mapData.has(`${x},${z}`)) { const t = createTile(x,z); mapData.set(`${x},${z}`,t); scene.add(t.mesh); }
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
