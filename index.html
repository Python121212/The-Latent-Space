<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Backrooms - Complete Structure</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; user-select: none; }
        canvas { display: block; }
        #lock-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); color: #eee; 
            display: flex; align-items: center; justify-content: center; z-index: 9999; cursor: pointer;
        }
        #stats { position: absolute; top: 15px; left: 15px; color: #fff; font-size: 12px; pointer-events: none; z-index: 100; }
        #stamina-bar { width: 100px; height: 4px; background: rgba(255,255,255,0.1); margin-top: 5px; }
        #stamina-fill { width: 100%; height: 100%; background: #ffeb3b; }
        #mobile-ui { position: absolute; inset: 0; pointer-events: none; z-index: 200; }
        .joy-container { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; pointer-events: auto; }
        #joystick-base { width: 100%; height: 100%; background: rgba(255,255,255,0.08); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        #joystick-stick { width: 50px; height: 50px; background: rgba(255,255,255,0.3); border-radius: 50%; }
        .action-group { position: absolute; bottom: 30px; right: 30px; width: 200px; height: 200px; pointer-events: none; }
        .btn { position: absolute; pointer-events: auto; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; border-radius: 50%; font-weight: bold; }
        #btn-jump { bottom: 80px; right: 80px; width: 80px; height: 80px; }
        #btn-shift { bottom: 0; right: 0; width: 80px; height: 80px; border-radius: 15px; }
    </style>
</head>
<body>
    <div id="lock-overlay" onclick="requestLock()">
        <div style="text-align:center"><h1>THE BACKROOMS</h1><p>CLICK TO START</p></div>
    </div>
    <div id="stats">LVL 0<div id="stamina-bar"><div id="stamina-fill"></div></div></div>
    <div id="mobile-ui">
        <div class="joy-container"><div id="joystick-base"><div id="joystick-stick"></div></div></div>
        <div class="action-group">
            <div id="btn-jump" class="btn">JUMP</div>
            <div id="btn-shift" class="btn">RUN</div>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a05);
        scene.fog = new THREE.Fog(0x0a0a05, 1, 12);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 20);
        camera.rotation.order = 'YXZ';
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const player = { pos: new THREE.Vector3(0, 0, 0), rot: { x: 0, y: 0 }, stamina: 100, currentSpeed: 0, bobTimer: 0, velY: 0, isGrounded: true };
        const keys = {};

        // マテリアル
        const wallMat = new THREE.MeshBasicMaterial({ color: 0x8a825d });
        const floorMat = new THREE.MeshBasicMaterial({ color: 0x7a724d });
        const ceilMat = new THREE.MeshBasicMaterial({ color: 0x9a926d });

        // ポインターロック
        window.requestLock = () => { renderer.domElement.requestPointerLock(); };
        document.addEventListener('pointerlockchange', () => {
            document.getElementById('lock-overlay').style.display = (document.pointerLockElement === renderer.domElement) ? 'none' : 'flex';
        });
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement) {
                player.rot.y -= e.movementX * 0.002;
                player.rot.x = Math.max(-1.4, Math.min(1.4, player.rot.x - e.movementY * 0.002));
            }
        });

        // モバイル入力
        let jActive = false, jInput = { x: 0, z: 0 };
        const jStick = document.getElementById('joystick-stick'), jBase = document.getElementById('joystick-base');
        jBase.addEventListener('touchstart', e => { jActive = true; });
        window.addEventListener('touchmove', e => {
            if(!jActive) return;
            const t = e.touches[0], r = jBase.getBoundingClientRect();
            const dx = t.clientX - (r.left + r.width/2), dy = t.clientY - (r.top + r.height/2);
            const d = Math.min(r.width/2, Math.sqrt(dx*dx+dy*dy)), a = Math.atan2(dy,dx);
            jStick.style.transform = `translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)`;
            jInput.x = (Math.cos(a)*d)/(r.width/2); jInput.z = (Math.sin(a)*d)/(r.height/2);
        });
        window.addEventListener('touchend', () => { jActive = false; jInput = {x:0,z:0}; jStick.style.transform = ''; });
        document.getElementById('btn-jump').ontouchstart = () => { if(player.isGrounded) player.velY = 0.12; };
        document.getElementById('btn-shift').ontouchstart = () => keys['shift'] = true;
        document.getElementById('btn-shift').ontouchend = () => keys['shift'] = false;

        // マップ生成ロジック
        const mapData = new Map();
        function createTile(tx, tz) {
            const group = new THREE.Group();
            // 床 (少し大きくして隙間防止)
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(5.05, 5.05), floorMat);
            floor.rotation.x = -Math.PI/2;
            group.add(floor);
            // 天井
            const ceil = new THREE.Mesh(new THREE.PlaneGeometry(5.05, 5.05), ceilMat);
            ceil.rotation.x = Math.PI/2;
            ceil.position.y = 3;
            group.add(ceil);

            const walls = [];
            // 擬似ランダムな壁生成
            const seed = Math.sin(tx * 12.9898 + tz * 78.233) * 43758.5453;
            const random = seed - Math.floor(seed);
            
            if (random > 0.7 && (Math.abs(tx) > 1 || Math.abs(tz) > 1)) {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(5, 3, 0.5), wallMat);
                wall.position.set(0, 1.5, 2.25);
                group.add(wall);
                const wallBox = new THREE.Box3().setFromObject(wall);
                wallBox.translate(new THREE.Vector3(tx*5, 0, tz*5));
                walls.push(wallBox);
            }

            group.position.set(tx * 5, 0, tz * 5);
            scene.add(group);
            return { mesh: group, walls };
        }

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function animate() {
            requestAnimationFrame(animate);

            // 重力とジャンプ
            player.pos.y += player.velY;
            if (player.pos.y > 0) { player.velY -= 0.006; player.isGrounded = false; }
            else { player.pos.y = 0; player.velY = 0; player.isGrounded = true; }

            // 移動計算
            const mx = (keys['d']?1:0) - (keys['a']?1:0) + jInput.x;
            const mz = (keys['s']?1:0) - (keys['w']?1:0) + jInput.z;
            const isMoving = Math.abs(mx) > 0.1 || Math.abs(mz) > 0.1;
            
            if (keys['shift'] && player.stamina > 0 && isMoving) {
                player.stamina -= 0.8;
                player.currentSpeed = 0.12;
            } else {
                player.stamina = Math.min(100, player.stamina + 0.4);
                player.currentSpeed = isMoving ? 0.07 : 0;
            }
            document.getElementById('stamina-fill').style.width = player.stamina + '%';

            if (isMoving) {
                const moveDir = new THREE.Vector3(mx, 0, mz).normalize().applyEuler(new THREE.Euler(0, player.rot.y, 0));
                // 衝突判定付き移動
                const nextX = player.pos.x + moveDir.x * player.currentSpeed;
                const nextZ = player.pos.z + moveDir.z * player.currentSpeed;
                
                let collisionX = false, collisionZ = false;
                const tx = Math.round(player.pos.x/5), tz = Math.round(player.pos.z/5);
                
                for(let x = tx-1; x <= tx+1; x++) {
                    for(let z = tz-1; z <= tz+1; z++) {
                        const tile = mapData.get(`${x},${z}`);
                        if(tile) tile.walls.forEach(box => {
                            if(box.intersectsSphere(new THREE.Sphere(new THREE.Vector3(nextX, 1, player.pos.z), 0.4))) collisionX = true;
                            if(box.intersectsSphere(new THREE.Sphere(new THREE.Vector3(player.pos.x, 1, nextZ), 0.4))) collisionZ = true;
                        });
                    }
                }
                if(!collisionX) player.pos.x = nextX;
                if(!collisionZ) player.pos.z = nextZ;
                player.bobTimer += player.currentSpeed * 4;
            }

            // カメラ更新
            camera.position.set(player.pos.x, 1.6 + player.pos.y + Math.sin(player.bobTimer)*0.04, player.pos.z);
            camera.rotation.set(player.rot.x, player.rot.y, 0);

            // 周辺タイルの動的生成
            const curTX = Math.round(player.pos.x / 5), curTZ = Math.round(player.pos.z / 5);
            for (let x = curTX - 5; x <= curTX + 5; x++) {
                for (let z = curTZ - 5; z <= curTZ + 5; z++) {
                    const key = `${x},${z}`;
                    if (!mapData.has(key)) {
                        mapData.set(key, createTile(x, z));
                    }
                }
            }

            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
