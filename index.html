<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Backrooms - Footsteps Added</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; user-select: none; }
        canvas { display: block; }
        #lock-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); color: #eee; display: flex; align-items: center; justify-content: center; z-index: 9999; cursor: pointer; }
        #stats { position: absolute; top: 15px; left: 15px; color: #fff; font-size: 12px; pointer-events: none; z-index: 100; }
        #stamina-bar { width: 100px; height: 4px; background: rgba(255,255,255,0.1); margin-top: 5px; }
        #stamina-fill { width: 100%; height: 100%; background: #ffeb3b; }
        #mobile-ui { position: absolute; inset: 0; pointer-events: none; z-index: 200; }
        .joy-container { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; pointer-events: auto; }
        #joystick-base { width: 100%; height: 100%; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); }
        #joystick-stick { width: 50px; height: 50px; background: rgba(255,255,255,0.2); border-radius: 50%; }
        .action-group { position: absolute; bottom: 30px; right: 30px; width: 220px; height: 220px; pointer-events: none; }
        .btn { position: absolute; pointer-events: auto; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; border-radius: 50%; font-weight: bold; font-size: 14px; -webkit-tap-highlight-color: transparent; }
        #btn-jump { bottom: 85px; right: 85px; width: 85px; height: 85px; font-size: 16px; }
        #btn-q { bottom: 140px; right: 0; width: 65px; height: 65px; }
        #btn-e { bottom: 0; right: 140px; width: 65px; height: 65px; }
        #btn-shift { bottom: 0; right: 0; width: 80px; height: 80px; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="lock-overlay" onclick="startApp()">
        <div style="text-align:center"><h1>THE BACKROOMS</h1><p>CLICK TO START</p></div>
    </div>
    
    <div id="stats">LVL 0<div id="stamina-bar"><div id="stamina-fill"></div></div></div>
    <div id="mobile-ui">
        <div class="joy-container"><div id="joystick-base"><div id="joystick-stick"></div></div></div>
        <div class="action-group">
            <div id="btn-jump" class="btn">JUMP</div>
            <div id="btn-q" class="btn">Q</div>
            <div id="btn-e" class="btn">E</div>
            <div id="btn-shift" class="btn">RUN</div>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a0d);
        scene.fog = new THREE.Fog(0x1a1a0d, 2, 12);

        const ambientLight = new THREE.AmbientLight(0xfffaaa, 0.4);
        scene.add(ambientLight);

        const playerLight = new THREE.PointLight(0xfff0aa, 1.5, 8);
        scene.add(playerLight);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 25);
        camera.rotation.order = 'YXZ';
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- オーディオ設定 ---
        const listener = new THREE.AudioListener();
        camera.add(listener);
        
        const humSound = new THREE.Audio(listener);
        const footstepSound = new THREE.Audio(listener);
        const audioLoader = new THREE.AudioLoader();
        
        audioLoader.load('hum.mp3', (buffer) => {
            humSound.setBuffer(buffer);
            humSound.setLoop(true);
            humSound.setVolume(0.4);
        });

        // 足音の読み込み (提供された音声を footstep.mp3 として保存してください)
        audioLoader.load('footstep.mp3', (buffer) => {
            footstepSound.setBuffer(buffer);
            footstepSound.setVolume(0.6);
        });

        window.startApp = () => {
            renderer.domElement.requestPointerLock();
            if (humSound.buffer && !humSound.isPlaying) humSound.play();
        };

        const player = { pos: new THREE.Vector3(0, 0, 0), rot: { x: 0, y: 0 }, stamina: 100, currentSpeed: 0, bobTimer: 0, velY: 0, isGrounded: true, lean: 0, stepTimer: 0 };
        const keys = {};

        const wallMat = new THREE.MeshStandardMaterial({ color: 0x9b9161, roughness: 0.8 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x7a724d, roughness: 0.9 });
        const lightMat = new THREE.MeshBasicMaterial({ color: 0xffffee });

        // 入力設定
        const setupBtn = (id, key, cb) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', e => { e.preventDefault(); keys[key]=true; if(cb)cb(); }, {passive:false});
            el.addEventListener('touchend', e => { e.preventDefault(); keys[key]=false; }, {passive:false});
        };
        const doJump = () => { if(player.isGrounded) player.velY = 0.13; };
        setupBtn('btn-q', 'q'); setupBtn('btn-e', 'e'); setupBtn('btn-shift', 'shift'); setupBtn('btn-jump', ' ', doJump);

        window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if(e.key === ' ') doJump(); });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        document.addEventListener('pointerlockchange', () => { document.getElementById('lock-overlay').style.display = (document.pointerLockElement === renderer.domElement) ? 'none' : 'flex'; });
        document.addEventListener('mousemove', (e) => { if (document.pointerLockElement === renderer.domElement) { player.rot.y -= e.movementX * 0.002; player.rot.x = Math.max(-1.4, Math.min(1.4, player.rot.x - e.movementY * 0.002)); } });

        // モバイル視点移動
        let lookId = null, lX, lY, jActive = false, jTouchId = null, jInput = { x: 0, z: 0 };
        const jStick = document.getElementById('joystick-stick'), jBase = document.getElementById('joystick-base');
        renderer.domElement.addEventListener('touchstart', e => { for(let t of e.changedTouches) if(t.pageX > window.innerWidth / 2) { lookId = t.identifier; lX = t.pageX; lY = t.pageY; } });
        jBase.addEventListener('touchstart', e => { e.preventDefault(); jActive = true; jTouchId = e.changedTouches[0].identifier; }, {passive:false});
        window.addEventListener('touchmove', e => {
            for(let t of e.changedTouches) {
                if(t.identifier === lookId) { player.rot.y -= (t.pageX-lX)*0.006; player.rot.x = Math.max(-1.4, Math.min(1.4, player.rot.x-(t.pageY-lY)*0.006)); lX=t.pageX; lY=t.pageY; }
                if(jActive && t.identifier === jTouchId) {
                    const r = jBase.getBoundingClientRect(); const dx = t.clientX - (r.left + r.width/2), dy = t.clientY - (r.top + r.height/2);
                    const d = Math.min(r.width/2, Math.sqrt(dx*dx+dy*dy)), a = Math.atan2(dy,dx);
                    jStick.style.transform = `translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)`;
                    jInput.x = (Math.cos(a)*d)/(r.width/2); jInput.z = (Math.sin(a)*d)/(r.height/2);
                }
            }
        }, { passive: false });
        window.addEventListener('touchend', e => { for(let t of e.changedTouches) { if(t.identifier === lookId) lookId = null; if(t.identifier === jTouchId) { jActive = false; jInput = {x:0,z:0}; jStick.style.transform = ''; } } });

        // マップ生成
        const mapData = new Map();
        function createTile(tx, tz) {
            const group = new THREE.Group();
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(5.05, 5.05), floorMat);
            floor.rotation.x = -Math.PI/2; group.add(floor);
            const ceil = new THREE.Mesh(new THREE.PlaneGeometry(5.05, 5.05), wallMat);
            ceil.rotation.x = Math.PI/2; ceil.position.y = 3; group.add(ceil);

            const lampFrame = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.1, 0.4), new THREE.MeshStandardMaterial({color:0x333333}));
            lampFrame.position.set(0, 2.96, 0); group.add(lampFrame);
            const lampLight = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.05, 0.3), lightMat);
            lampLight.position.set(0, 2.93, 0); group.add(lampLight);

            const walls = [];
            const seed = Math.sin(tx * 12.98 + tz * 78.23) * 43758.54;
            if (seed - Math.floor(seed) > 0.75 && (Math.abs(tx) > 1 || Math.abs(tz) > 1)) {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(5, 3, 0.5), wallMat);
                wall.position.set(0, 1.5, 2.25); group.add(wall);
                const wallBox = new THREE.Box3().setFromObject(wall); wallBox.translate(new THREE.Vector3(tx*5, 0, tz*5));
                walls.push(wallBox);
            }
            group.position.set(tx * 5, 0, tz * 5);
            scene.add(group);
            return { mesh: group, walls };
        }

        function animate() {
            requestAnimationFrame(animate);
            player.pos.y += player.velY;
            if (player.pos.y > 0) { player.velY -= 0.007; player.isGrounded = false; } else { player.pos.y = 0; player.velY = 0; player.isGrounded = true; }

            const mx = (keys['d']?1:0) - (keys['a']?1:0) + jInput.x;
            const mz = (keys['s']?1:0) - (keys['w']?1:0) + jInput.z;
            const isMoving = (Math.abs(mx) > 0.1 || Math.abs(mz) > 0.1) && player.isGrounded;
            
            if (keys['shift'] && player.stamina > 0 && isMoving) { player.stamina -= 0.8; player.currentSpeed = 0.13; }
            else { player.stamina = Math.min(100, player.stamina + 0.5); player.currentSpeed = isMoving ? 0.08 : 0; }
            document.getElementById('stamina-fill').style.width = player.stamina + '%';

            // 移動と足音
            if (isMoving) {
                const moveDir = new THREE.Vector3(mx, 0, mz).normalize().applyEuler(new THREE.Euler(0, player.rot.y, 0));
                const nextX = player.pos.x + moveDir.x * player.currentSpeed;
                const nextZ = player.pos.z + moveDir.z * player.currentSpeed;
                
                let colX = false, colZ = false;
                const tx = Math.round(player.pos.x/5), tz = Math.round(player.pos.z/5);
                for(let x = tx-1; x <= tx+1; x++) for(let z = tz-1; z <= tz+1; z++) {
                    const tile = mapData.get(`${x},${z}`);
                    if(tile) tile.walls.forEach(box => {
                        if(box.intersectsSphere(new THREE.Sphere(new THREE.Vector3(nextX, 1, player.pos.z), 0.4))) colX = true;
                        if(box.intersectsSphere(new THREE.Sphere(new THREE.Vector3(player.pos.x, 1, nextZ), 0.4))) colZ = true;
                    });
                }
                if(!colX) player.pos.x = nextX; if(!colZ) player.pos.z = nextZ;
                
                // ヘッドボブ（視点の揺れ）
                player.bobTimer += player.currentSpeed * 4;

                // 足音のタイミング計算（移動速度に合わせて間隔を調整）
                player.stepTimer += player.currentSpeed;
                if (player.stepTimer > 0.35) { // 一定距離進むごとに音を鳴らす
                    if (footstepSound.buffer) {
                        if (footstepSound.isPlaying) footstepSound.stop();
                        // 走っている時は少し高音にして速さを演出
                        footstepSound.setPlaybackRate(keys['shift'] ? 1.2 : 1.0);
                        footstepSound.play();
                    }
                    player.stepTimer = 0;
                }
            }

            player.lean += (((keys['e']?1:0)-(keys['q']?1:0)) - player.lean) * 0.1;
            camera.position.set(player.pos.x, 1.6 + player.pos.y + Math.sin(player.bobTimer)*0.05, player.pos.z);
            camera.position.add(new THREE.Vector3(player.lean * 0.6, 0, 0).applyEuler(new THREE.Euler(0, player.rot.y, 0)));
            camera.rotation.set(player.rot.x, player.rot.y, -player.lean * 0.15);

            playerLight.position.set(player.pos.x, 2.2, player.pos.z);
            playerLight.intensity = 1.5 + Math.sin(Date.now()*0.01)*0.1;

            const curTX = Math.round(player.pos.x / 5), curTZ = Math.round(player.pos.z / 5);
            for (let x = curTX - 5; x <= curTX + 5; x++) for (let z = curTZ - 5; z <= curTZ + 5; z++) {
                if (!mapData.has(`${x},${z}`)) mapData.set(`${x},${z}`, createTile(x, z));
            }
            renderer.render(scene, camera);
        }
        animate();
        window.onresize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    </script>
</body>
</html>
