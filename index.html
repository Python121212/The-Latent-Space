<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Backrooms - Hybrid & Hidden Generation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a05; touch-action: none; font-family: sans-serif; }
        canvas { display: block; image-rendering: pixelated; }
        #ui { position: absolute; top: 10px; left: 10px; color: #fff; font-size: 12px; pointer-events: none; text-shadow: 1px 1px #000; z-index: 10; }
        #stamina-bar { width: 120px; height: 6px; background: rgba(0,0,0,0.5); border: 1px solid #444; margin-top: 5px; }
        #stamina-fill { width: 100%; height: 100%; background: #eee; }
        
        /* 操作ガイド */
        #guide { position: absolute; top: 10px; right: 10px; color: rgba(255,255,255,0.5); font-size: 10px; text-align: right; pointer-events: none; }

        /* モバイルUI */
        #joystick-base { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); z-index: 20; }
        #joystick-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: rgba(255,255,255,0.2); border-radius: 50%; pointer-events: none; }
        .action-btns { position: absolute; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 15px; align-items: flex-end; z-index: 20; }
        .btn { width: 60px; height: 60px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; font-size: 14px; user-select: none; }
        #btn-shift { width: 80px; height: 80px; border-radius: 15px; background: rgba(255,255,255,0.05); }

        /* PCではボタンを隠す（任意） */
        @media (pointer: fine) { .btn, #joystick-base { opacity: 0.3; } }
    </style>
</head>
<body>
    <div id="ui">LEVEL 0<div id="stamina-bar"><div id="stamina-fill"></div></div></div>
    <div id="guide">WASD: Move | Shift: Run<br>Q/E: Lean | Mouse: Look</div>
    
    <div id="joystick-base"><div id="joystick-stick"></div></div>
    <div class="action-btns">
        <div style="display:flex; gap:10px;">
            <div id="btn-q" class="btn">Q</div>
            <div id="btn-e" class="btn">E</div>
        </div>
        <div id="btn-shift" class="btn">RUN</div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module">
        import * as THREE from 'three';

        const TILE_SIZE = 5;
        const VIEW_DIST = 4; // 生成距離を広げる
        const mapData = new Map();
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a05);
        // 霧を濃くして生成境界（15m付近）を完全に見えなくする
        scene.fog = new THREE.Fog(0x0a0a05, 1, 12); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 25);
        camera.rotation.order = 'YXZ';
        
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setPixelRatio(window.devicePixelRatio > 1 ? 0.5 : 1); 
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const wallMat = new THREE.MeshBasicMaterial({ color: 0x8a825d });
        const floorMat = new THREE.MeshBasicMaterial({ color: 0x7a724d });

        const player = { 
            pos: new THREE.Vector3(0, 0, 0), rot: { x: 0, y: 0 },
            stamina: 100, isExhausted: false,
            currentSpeed: 0, bobTimer: 0, lean: 0
        };
        const keys = {};

        // --- PC キーボード操作 ---
        window.onkeydown = e => keys[e.key.toLowerCase()] = true;
        window.onkeyup = e => keys[e.key.toLowerCase()] = false;
        
        document.addEventListener('mousedown', () => renderer.domElement.requestPointerLock());
        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement === renderer.domElement) {
                player.rot.y -= e.movementX * 0.003;
                player.rot.x = Math.max(-1.4, Math.min(1.4, player.rot.x - e.movementY * 0.003));
            }
        });

        // --- モバイル スティック操作 ---
        let jActive = false, jInput = { x: 0, z: 0 };
        const jBase = document.getElementById('joystick-base'), jStick = document.getElementById('joystick-stick');
        
        const handleMove = (e) => {
            if(!jActive) return;
            const touch = e.touches ? e.touches[0] : e;
            const rect = jBase.getBoundingClientRect();
            const dx = touch.clientX - (rect.left + 50), dy = touch.clientY - (rect.top + 50);
            const dist = Math.min(50, Math.sqrt(dx*dx + dy*dy));
            const angle = Math.atan2(dy, dx);
            jStick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            jInput.x = (Math.cos(angle) * dist) / 50;
            jInput.z = (Math.sin(angle) * dist) / 50;
        };
        jBase.addEventListener('touchstart', e => { jActive = true; handleMove(e); });
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', () => { jActive = false; jStick.style.transform = ''; jInput = {x:0, z:0}; });

        // モバイル視点
        let lastTX, lastTY;
        window.addEventListener('touchstart', e => { if(!jActive){ lastTX = e.touches[0].pageX; lastTY = e.touches[0].pageY; }}, {passive:false});
        window.addEventListener('touchmove', e => {
            if(jActive || e.touches.length > 1) return;
            player.rot.y -= (e.touches[0].pageX - lastTX) * 0.006;
            player.rot.x = Math.max(-1.4, Math.min(1.4, player.rot.x - (e.touches[0].pageY - lastTY) * 0.006));
            lastTX = e.touches[0].pageX; lastTY = e.touches[0].pageY;
        });

        // ボタン
        const b = (id, k) => {
            const el = document.getElementById(id);
            el.ontouchstart = e => { e.preventDefault(); keys[k] = true; };
            el.ontouchend = () => keys[k] = false;
        };
        b('btn-q','q'); b('btn-e','e'); b('btn-shift','shift');

        // --- マップ生成 ---
        function createTile(tx, tz) {
            const group = new THREE.Group();
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(TILE_SIZE, TILE_SIZE), floorMat);
            floor.rotation.x = -Math.PI/2; group.add(floor);
            const ceil = new THREE.Mesh(new THREE.PlaneGeometry(TILE_SIZE, TILE_SIZE), floorMat);
            ceil.rotation.x = Math.PI/2; ceil.position.y = 3; group.add(ceil);
            const walls = [];
            // タイルごとの壁生成ロジック
            if (Math.abs(tx) > 1 || Math.abs(tz) > 1) {
                const seed = Math.sin(tx * 12.9 + tz * 78.2);
                if (seed > 0.5) {
                    const w = new THREE.Mesh(new THREE.BoxGeometry(5, 3, 0.3), wallMat);
                    w.position.set(0, 1.5, 2.5); group.add(w);
                    walls.push(new THREE.Box3().setFromObject(w).translate(new THREE.Vector3(tx*TILE_SIZE, 0, tz*TILE_SIZE)));
                }
            }
            group.position.set(tx * TILE_SIZE, 0, tz * TILE_SIZE);
            return { mesh: group, walls };
        }

        function animate() {
            requestAnimationFrame(animate);

            // 入力の統合 (キーボード + スティック)
            let mx = (keys['d']?1:0) - (keys['a']?1:0) + jInput.x;
            let mz = (keys['s']?1:0) - (keys['w']?1:0) + jInput.z;
            const isMoving = Math.abs(mx) > 0.1 || Math.abs(mz) > 0.1;

            // スタミナ
            if (player.stamina <= 0) player.isExhausted = true;
            if (player.stamina >= 30) player.isExhausted = false;
            const isSprinting = keys['shift'] && !player.isExhausted && isMoving;
            player.stamina = Math.max(0, Math.min(100, player.stamina + (isSprinting ? -1.0 : 0.6)));
            document.getElementById('stamina-fill').style.width = player.stamina + '%';
            document.getElementById('stamina-fill').style.background = player.isExhausted ? '#f44' : '#eee';

            const targetSpeed = isMoving ? (isSprinting ? 0.13 : 0.07) : 0;
            player.currentSpeed += (targetSpeed - player.currentSpeed) * 0.1;

            if (player.currentSpeed > 0.001) {
                const moveDir = new THREE.Vector3(mx, 0, mz).normalize().applyEuler(new THREE.Euler(0, player.rot.y, 0));
                ['x', 'z'].forEach(axis => {
                    const next = player.pos[axis] + moveDir[axis] * player.currentSpeed;
                    const testBox = new THREE.Box3().setFromCenterAndSize(
                        player.pos.clone().setComponent(axis==='x'?0:2, next).add(new THREE.Vector3(0,1,0)), 
                        new THREE.Vector3(0.6, 1.8, 0.6)
                    );
                    let hit = false;
                    const tx = Math.round(player.pos.x / TILE_SIZE), tz = Math.round(player.pos.z / TILE_SIZE);
                    for(let x=-1; x<=1; x++) for(let z=-1; z<=1; z++) {
                        const t = mapData.get(`${tx+x},${tz+z}`);
                        if(t) t.walls.forEach(w => { if(testBox.intersectsBox(w)) hit = true; });
                    }
                    if(!hit) player.pos[axis] = next;
                });
                player.bobTimer += player.currentSpeed * 2.5;
            }

            // カメラ更新
            const targetLean = (keys['e']?1:0) - (keys['q']?1:0);
            player.lean += (targetLean - player.lean) * 0.1;
            const bobY = Math.sin(player.bobTimer) * player.currentSpeed * 0.5;
            camera.position.set(player.pos.x, 1.5 + bobY, player.pos.z);
            const leanOff = new THREE.Vector3(player.lean * 0.6, 0, 0).applyEuler(new THREE.Euler(0, player.rot.y, 0));
            camera.position.add(leanOff);
            camera.rotation.set(player.rot.x, player.rot.y, -player.lean * 0.15);

            // マップ生成 (遠くまで生成)
            const ptx = Math.round(player.pos.x / TILE_SIZE), ptz = Math.round(player.pos.z / TILE_SIZE);
            for(let x=ptx-VIEW_DIST; x<=ptx+VIEW_DIST; x++) {
                for(let z=ptz-VIEW_DIST; z<=ptz+VIEW_DIST; z++) {
                    if(!mapData.has(`${x},${z}`)) {
                        const t = createTile(x, z); mapData.set(`${x},${z}`, t); scene.add(t.mesh);
                    }
                }
            }
            renderer.render(scene, camera);
        }
        animate();
        window.onresize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    </script>
</body>
</html>
