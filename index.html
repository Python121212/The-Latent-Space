<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Backrooms - Ultra Lite</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #vhs-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.9) 150%); }
        #ui { position: absolute; bottom: 20px; left: 20px; color: #eee; font-family: monospace; font-size: 10px; z-index: 110; pointer-events: none; }
        #stamina-container { width: 100px; height: 4px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); margin-top: 5px; }
        #stamina-bar { width: 100%; height: 100%; background: #fff; }
        canvas { cursor: crosshair; }
        #move-zone, #look-zone { position: absolute; bottom: 0; width: 50%; height: 100%; z-index: 200; }
        #move-zone { left: 0; } #look-zone { right: 0; }
        #sprint-btn { position: absolute; bottom: 30px; right: 30px; width: 60px; height: 60px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; z-index: 300; font-size: 10px; }
    </style>
</head>
<body>
    <div id="ui">ASYNC_OS v0.1<div id="stamina-container"><div id="stamina-bar"></div></div></div>
    <div id="vhs-container"><div class="vignette"></div></div>
    <div id="move-zone"></div><div id="look-zone"></div>
    <div id="sprint-btn">RUN</div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module">
        import * as THREE from 'three';

        const TILE_SIZE = 5;
        const VIEW_DISTANCE = 3; // 描画距離を短縮
        const mapData = new Map();
        const flickerList = [];
        const scene = new THREE.Scene();
        const fogColor = 0x15150a;
        scene.fog = new THREE.Fog(fogColor, 1, 12);
        scene.background = new THREE.Color(fogColor);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 30);
        const renderer = new THREE.WebGLRenderer({ antialias: false }); // アンチエイリアスOFF
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(0.7); // 解像度を落として負荷軽減
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xfff5d1, 0.5));
        const pLight = new THREE.PointLight(0xfff5d1, 10, 8);
        scene.add(pLight);

        const wallMat = new THREE.MeshLambertMaterial({ color: 0x8a825d });
        const floorMat = new THREE.MeshLambertMaterial({ color: 0x7a724d });

        const player = { 
            pos: new THREE.Vector3(0, 1.5, 0), rot: new THREE.Euler(0, 0, 0, 'YXZ'), 
            stamina: 100, isExhausted: false, isSprinting: false 
        };

        const input = { moveX: 0, moveY: 0, lookId: null, lastX: 0, lastY: 0, btnSprint: false };
        const keys = { w:0, a:0, s:0, d:0, shift: false };

        window.onkeydown = e => { if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = 1; if(e.key === 'Shift') keys.shift = true; };
        window.onkeyup = e => { if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = 0; if(e.key === 'Shift') keys.shift = false; };

        const sprintBtn = document.getElementById('sprint-btn');
        sprintBtn.ontouchstart = (e) => { e.preventDefault(); input.btnSprint = true; };
        sprintBtn.ontouchend = () => input.btnSprint = false;

        document.getElementById('move-zone').ontouchstart = e => { input.moveId = e.changedTouches[0].identifier; input.startX = e.changedTouches[0].clientX; input.startY = e.changedTouches[0].clientY; };
        document.getElementById('move-zone').ontouchmove = e => {
            for(let t of e.changedTouches) if(t.identifier === input.moveId) {
                input.moveX = Math.max(-1, Math.min(1, (t.clientX - input.startX) / 30));
                input.moveY = Math.max(-1, Math.min(1, (t.clientY - input.startY) / 30));
            }
        };
        document.getElementById('move-zone').ontouchend = () => { input.moveX = input.moveY = 0; };

        document.getElementById('look-zone').ontouchstart = e => { input.lookId = e.changedTouches[0].identifier; input.lastX = e.changedTouches[0].clientX; input.lastY = e.changedTouches[0].clientY; };
        document.getElementById('look-zone').ontouchmove = e => {
            for(let t of e.changedTouches) if(t.identifier === input.lookId) {
                player.rot.y -= (t.clientX - input.lastX) * 0.006;
                player.rot.x = Math.max(-1.4, Math.min(1.4, player.rot.x - (t.clientY - input.lastY) * 0.006));
                input.lastX = t.clientX; input.lastY = t.clientY;
            }
        };

        function seededRandom(x, z) { return (Math.abs(Math.sin(x * 12.9898 + z * 78.233) * 43758.5453) % 1); }

        function createTile(tx, tz) {
            const group = new THREE.Group();
            group.add(new THREE.Mesh(new THREE.PlaneGeometry(TILE_SIZE, TILE_SIZE), floorMat).rotateX(-Math.PI/2));
            const ceil = new THREE.Mesh(new THREE.PlaneGeometry(TILE_SIZE, TILE_SIZE), wallMat).rotateX(Math.PI/2);
            ceil.position.y = 3; group.add(ceil);
            
            const r = seededRandom(tx, tz);
            if (r < 0.9) {
                const lamp = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.1, 0.4), new THREE.MeshStandardMaterial({ emissive: 0xffffff, emissiveIntensity: 2 }));
                lamp.position.set(0, 2.95, 0); group.add(lamp);
                const l = new THREE.PointLight(0xfff5d1, 4, 5); l.position.set(0, 2.4, 0); group.add(l);
                if (r > 0.8) flickerList.push({ lamp, l, offset: r * 10 });
            }

            const walls = [];
            if (Math.abs(tx) > 1 || Math.abs(tz) > 1) {
                [[0, 1.5, 2.5, 5, 3, 0.2], [2.5, 1.5, 0, 0.2, 3, 5]].forEach((c, i) => {
                    if (seededRandom(tx + i, tz + i) > 0.72) {
                        const wall = new THREE.Mesh(new THREE.BoxGeometry(c[3], c[4], c[5]), wallMat);
                        wall.position.set(c[0], c[1], c[2]); group.add(wall);
                        walls.push(new THREE.Box3().setFromObject(wall).translate(new THREE.Vector3(tx*TILE_SIZE, 0, tz*TILE_SIZE)));
                    }
                });
            }
            group.position.set(tx * TILE_SIZE, 0, tz * TILE_SIZE);
            return { mesh: group, walls: walls };
        }

        function updateMap() {
            const px = Math.round(player.pos.x / TILE_SIZE), pz = Math.round(player.pos.z / TILE_SIZE);
            for (let x = px-VIEW_DISTANCE; x <= px+VIEW_DISTANCE; x++) {
                for (let z = pz-VIEW_DISTANCE; z <= pz+VIEW_DISTANCE; z++) {
                    const k = `${x},${z}`;
                    if (!mapData.has(k)) { const t = createTile(x, z); mapData.set(k, t); scene.add(t.mesh); }
                    else if (!scene.children.includes(mapData.get(k).mesh)) { scene.add(mapData.get(k).mesh); }
                }
            }
            mapData.forEach((t, k) => {
                const [tx, tz] = k.split(',').map(Number);
                if (Math.abs(tx-px) > VIEW_DISTANCE || Math.abs(tz-pz) > VIEW_DISTANCE) scene.remove(t.mesh);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;
            flickerList.forEach(f => {
                const v = Math.sin(time * 40 + f.offset) > 0.5 ? 2 : 0.1;
                f.lamp.material.emissiveIntensity = v; f.l.intensity = v * 2;
            });

            let mx = input.moveX || (keys.d - keys.a), mz = input.moveY || (keys.s - keys.w);
            const isMoving = Math.abs(mx) > 0.1 || Math.abs(mz) > 0.1;

            if (player.stamina <= 0) player.isExhausted = true;
            if (player.stamina > 30) player.isExhausted = false;
            player.isSprinting = (keys.shift || input.btnSprint) && isMoving && !player.isExhausted;
            player.stamina = Math.max(0, Math.min(100, player.stamina + (player.isSprinting ? -0.6 : 0.4)));
            document.getElementById('stamina-bar').style.width = player.stamina + '%';

            if (isMoving) {
                const speed = player.isSprinting ? 0.12 : 0.06;
                const dir = new THREE.Vector3(mx, 0, mz).normalize().applyEuler(new THREE.Euler(0, player.rot.y, 0));
                
                ['x', 'z'].forEach(axis => {
                    const next = player.pos[axis] + dir[axis] * speed;
                    const testPos = player.pos.clone(); testPos[axis] = next;
                    const box = new THREE.Box3().setFromCenterAndSize(testPos, new THREE.Vector3(0.5, 1, 0.5));
                    
                    let hit = false;
                    const px = Math.round(player.pos.x / TILE_SIZE), pz = Math.round(player.pos.z / TILE_SIZE);
                    // 周辺タイルのみ衝突判定
                    for(let ox=-1; ox<=1; ox++) for(let oz=-1; oz<=1; oz++) {
                        const t = mapData.get(`${px+ox},${pz+oz}`);
                        if(t) for(let w of t.walls) if(box.intersectsBox(w)) hit = true;
                    }
                    if (!hit) player.pos[axis] = next;
                });
                player.pos.y = 1.5 + Math.sin(time * (player.isSprinting ? 15 : 10)) * 0.03;
            }

            pLight.position.copy(player.pos);
            camera.position.copy(player.pos);
            camera.rotation.copy(player.rot);
            updateMap();
            renderer.render(scene, camera);
        }
        animate();
        window.onresize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    </script>
</body>
</html>
