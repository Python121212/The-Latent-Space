<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Backrooms - Pro Controls</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Courier New', Courier, monospace; user-select: none; }
        canvas { display: block; image-rendering: pixelated; }
        
        /* 画面上部のステータス */
        #stats { position: absolute; top: 20px; left: 20px; color: #eeeeaa; font-size: 14px; pointer-events: none; z-index: 100; text-shadow: 2px 2px #000; }
        #stamina-bar { width: 150px; height: 8px; background: rgba(0,0,0,0.7); border: 1px solid #555; margin-top: 8px; overflow: hidden; }
        #stamina-fill { width: 100%; height: 100%; background: #ffffaa; transition: width 0.1s linear; }

        /* スタート案内（もっと目立たなく、すぐ消える） */
        #lock-msg { 
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); 
            color: #fff; text-align: center; pointer-events: none; z-index: 50;
            background: rgba(0,0,0,0.6); padding: 15px 30px; border: 1px solid #444;
        }

        /* --- 操作系（ここを使いやすく改善） --- */
        #controls-layer { position: absolute; inset: 0; pointer-events: none; z-index: 200; }
        
        /* 左：ジョイスティック（少し大きく、位置を調整） */
        #joystick-base { position: absolute; bottom: 60px; left: 60px; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; }
        #joystick-stick { position: absolute; top: 30px; left: 30px; width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 50%; pointer-events: none; }

        /* 右：アクションボタン（押しやすさ優先） */
        .btn-group { position: absolute; bottom: 40px; right: 40px; display: grid; grid-template-areas: "jump jump" "q e" "run run"; gap: 15px; pointer-events: auto; }
        .btn { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; 
            display: flex; align-items: center; justify-content: center; font-weight: bold;
            -webkit-tap-highlight-color: transparent; border-radius: 12px;
        }
        .btn:active { background: rgba(255,255,255,0.4); transform: scale(0.95); }
        
        #btn-jump { grid-area: jump; height: 70px; font-size: 18px; background: rgba(255,255,255,0.15); }
        #btn-q { grid-area: q; width: 75px; height: 75px; border-radius: 50%; }
        #btn-e { grid-area: e; width: 75px; height: 75px; border-radius: 50%; }
        #btn-shift { grid-area: run; height: 60px; font-size: 16px; letter-spacing: 2px; }

    </style>
</head>
<body>
    <div id="stats">LEVEL 0<div id="stamina-bar"><div id="stamina-fill"></div></div></div>
    <div id="lock-msg">TOUCH SCREEN TO START</div>

    <div id="controls-layer">
        <div id="joystick-base"><div id="joystick-stick"></div></div>
        <div class="btn-group">
            <div id="btn-jump" class="btn">JUMP</div>
            <div id="btn-q" class="btn">Q</div>
            <div id="btn-e" class="btn">E</div>
            <div id="btn-shift" class="btn">RUN</div>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050500);
        scene.fog = new THREE.Fog(0x050500, 1, 15);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 20);
        camera.rotation.order = 'YXZ';
        
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2) * 0.7); 
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const wallMat = new THREE.MeshBasicMaterial({ color: 0x8a825d });
        const floorMat = new THREE.MeshBasicMaterial({ color: 0x7a724d });

        const player = { 
            pos: new THREE.Vector3(0, 0, 0), rot: { x: 0, y: 0 },
            stamina: 100, isExhausted: false, currentSpeed: 0, bobTimer: 0, lean: 0, velY: 0, isGrounded: true
        };
        const keys = {};

        // --- UI非表示処理 ---
        const msg = document.getElementById('lock-msg');
        const hideUI = () => { msg.style.display = 'none'; };

        // --- 入力制御 (マルチタッチ) ---
        const setupBtn = (id, key, callback) => {
            const el = document.getElementById(id);
            const start = (e) => { e.preventDefault(); keys[key] = true; hideUI(); if(callback) callback(); };
            const end = (e) => { e.preventDefault(); keys[key] = false; };
            el.addEventListener('touchstart', start); el.addEventListener('touchend', end);
        };
        setupBtn('btn-q', 'q'); setupBtn('btn-e', 'e'); setupBtn('btn-shift', 'shift'); setupBtn('btn-jump', 'space', jump);

        // PC
        window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if(e.code === 'Space') jump(); hideUI(); });
        window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
        document.addEventListener('mousedown', () => { if(!document.pointerLockElement) renderer.domElement.requestPointerLock(); hideUI(); });
        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement === renderer.domElement) {
                player.rot.y -= e.movementX * 0.002;
                player.rot.x = Math.max(-1.4, Math.min(1.4, player.rot.x - e.movementY * 0.002));
            }
        });

        // スティック & 視点
        let jActive = false, jTouchId = null, jInput = { x: 0, z: 0 };
        const jBase = document.getElementById('joystick-base'), jStick = document.getElementById('joystick-stick');
        
        jBase.addEventListener('touchstart', e => {
            e.preventDefault(); jActive = true; jTouchId = e.changedTouches[0].identifier;
            updateJoystick(e.changedTouches[0]);
        }, { passive: false });

        window.addEventListener('touchmove', e => {
            for(let t of e.changedTouches) {
                if(jActive && t.identifier === jTouchId) { updateJoystick(t); e.preventDefault(); }
                if(t.identifier === lookId) {
                    player.rot.y -= (t.pageX - lX) * 0.007;
                    player.rot.x = Math.max(-1.4, Math.min(1.4, player.rot.x - (t.pageY - lY) * 0.007));
                    lX = t.pageX; lY = t.pageY;
                }
            }
        }, { passive: false });

        let lookId = null, lX, lY;
        renderer.domElement.addEventListener('touchstart', e => {
            for(let t of e.changedTouches) {
                if(t.pageX > window.innerWidth / 3 && lookId === null) { lookId = t.identifier; lX = t.pageX; lY = t.pageY; }
            }
        });

        window.addEventListener('touchend', e => {
            for(let t of e.changedTouches) {
                if(t.identifier === jTouchId) { jActive = false; jTouchId = null; jStick.style.transform = ''; jInput = {x:0,z:0}; }
                if(t.identifier === lookId) lookId = null;
            }
        });

        function updateJoystick(t) {
            const r = jBase.getBoundingClientRect();
            const dx = t.clientX - (r.left + r.width/2), dy = t.clientY - (r.top + r.height/2);
            const d = Math.min(r.width/2, Math.sqrt(dx*dx+dy*dy)), a = Math.atan2(dy,dx);
            jStick.style.transform = `translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)`;
            jInput.x = (Math.cos(a)*d)/(r.width/2); jInput.z = (Math.sin(a)*d)/(r.height/2);
        }

        function jump() { if(player.isGrounded) { player.velY = 0.13; player.isGrounded = false; } }

        // --- マップシステム ---
        const mapData = new Map();
        function createTile(tx, tz) {
            const g = new THREE.Group();
            g.add(new THREE.Mesh(new THREE.PlaneGeometry(5.05,5.05), floorMat).rotateX(-Math.PI/2)); // 隙間防止
            const c = new THREE.Mesh(new THREE.PlaneGeometry(5,5), floorMat);
            c.rotation.x = Math.PI/2; c.position.y = 3; g.add(c);
            const walls = [];
            if (Math.abs(tx) > 1 || Math.abs(tz) > 1) {
                if (Math.sin(tx*7+tz*3) > 0.45) {
                    const w = new THREE.Mesh(new THREE.BoxGeometry(5, 3, 0.5), wallMat);
                    w.position.set(0, 1.5, 2.5); g.add(w);
                    walls.push(new THREE.Box3().setFromObject(w).translate(new THREE.Vector3(tx*5, 0, tz*5)));
                }
            }
            g.position.set(tx*5, 0, tz*5);
            return { mesh: g, walls };
        }

        function animate() {
            requestAnimationFrame(animate);

            // 重力
            player.pos.y += player.velY;
            if (player.pos.y > 0) { player.velY -= 0.007; player.isGrounded = false; }
            else { player.pos.y = 0; player.velY = 0; player.isGrounded = true; }

            // 移動
            const mx = (keys['d']?1:0) - (keys['a']?1:0) + jInput.x;
            const mz = (keys['s']?1:0) - (keys['w']?1:0) + jInput.z;
            const isMoving = Math.abs(mx) > 0.05 || Math.abs(mz) > 0.05;

            if (player.stamina <= 0) player.isExhausted = true;
            if (player.stamina >= 25) player.isExhausted = false;
            const isSprinting = keys['shift'] && !player.isExhausted && isMoving;
            player.stamina = Math.max(0, Math.min(100, player.stamina + (isSprinting ? -1.2 : 0.7)));
            document.getElementById('stamina-fill').style.width = player.stamina + '%';

            const targetSpeed = isMoving ? (isSprinting ? 0.15 : 0.08) : 0;
            player.currentSpeed += (targetSpeed - player.currentSpeed) * 0.15;

            if (player.currentSpeed > 0.001) {
                const moveDir = new THREE.Vector3(mx, 0, mz).normalize().applyEuler(new THREE.Euler(0, player.rot.y, 0));
                ['x', 'z'].forEach(axis => {
                    const next = player.pos[axis] + moveDir[axis] * player.currentSpeed;
                    const tx = Math.round(player.pos.x/5), tz = Math.round(player.pos.z/5);
                    let hit = false;
                    for(let x=-1;x<=1;x++) for(let z=-1;z<=1;z++){
                        const t = mapData.get(`${tx+x},${tz+z}`);
                        if(t) t.walls.forEach(w => { 
                            const pBox = new THREE.Box3().setFromCenterAndSize(player.pos.clone().setComponent(axis==='x'?0:2, next).add(new THREE.Vector3(0, 1.5, 0)), new THREE.Vector3(0.7, 2.8, 0.7));
                            if(pBox.intersectsBox(w)) hit = true;
                        });
                    }
                    if(!hit) player.pos[axis] = next;
                });
                if(player.isGrounded) player.bobTimer += player.currentSpeed * 3.5;
            }

            // カメラ制御
            player.lean += (((keys['e']?1:0) - (keys['q']?1:0)) - player.lean) * 0.12;
            const bobY = player.isGrounded ? Math.sin(player.bobTimer)*0.06 : 0;
            camera.position.set(player.pos.x, 1.6 + player.pos.y + bobY, player.pos.z);
            camera.position.add(new THREE.Vector3(player.lean * 0.8, 0, 0).applyEuler(new THREE.Euler(0, player.rot.y, 0)));
            camera.rotation.set(player.rot.x, player.rot.y, -player.lean * 0.18);

            // 動的生成
            const ptx = Math.round(player.pos.x/5), ptz = Math.round(player.pos.z/5);
            for(let x=ptx-6; x<=ptx+6; x++) for(let z=ptz-6; z<=ptz+6; z++) {
                if(!mapData.has(`${x},${z}`)) { const t = createTile(x,z); mapData.set(`${x},${z}`,t); scene.add(t.mesh); }
            }
            renderer.render(scene, camera);
        }
        animate();
        window.onresize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    </script>
</body>
</html>
