<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Backrooms - Menu Update</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Courier New', Courier, monospace; user-select: none; }
        canvas { display: block; }
        
        /* --- ローディング --- */
        #loading-screen {
            position: fixed; inset: 0; background: #000; color: #dbd4a2;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000;
        }
        .loader { width: 40px; height: 40px; border: 2px solid #333; border-top-color: #dbd4a2; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- ホーム画面 --- */
        .overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
        #lock-overlay { 
            background: radial-gradient(circle, #2a2a1a 0%, #000 100%); 
            color: #dbd4a2; flex-direction: column; border: 20px solid #000; display: none;
        }
        
        #lock-overlay::before {
            content: " "; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .title-container { text-align: center; margin-bottom: 40px; }
        .main-title { font-size: clamp(32px, 8vw, 48px); font-weight: 900; letter-spacing: 10px; margin: 0; color: #eee5a1; text-shadow: 3px 3px 0px #3d3d29; }
        
        .menu-options { display: flex; flex-direction: column; gap: 15px; width: 220px; z-index: 10; }
        .home-btn { 
            padding: 15px; background: rgba(42, 42, 26, 0.8); border: 1px solid #444; 
            color: #dbd4a2; cursor: pointer; font-family: inherit; font-size: 16px; 
            letter-spacing: 2px; transition: 0.2s;
        }
        .home-btn:active { background: #3d3d29; transform: scale(0.98); }

        /* --- 設定パネル（共通） --- */
        .settings-panel {
            display: none; position: absolute; width: 280px; padding: 20px; 
            background: #1a1a0d; border: 1px solid #444; box-shadow: 0 0 30px #000; z-index: 100;
        }
        .settings-panel h2 { font-size: 18px; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; letter-spacing: 3px; }
        .setting-row { margin: 20px 0; font-size: 13px; text-align: left; }
        input[type=range] { width: 100%; accent-color: #dbd4a2; margin-top: 8px; cursor: pointer; }

        /* --- ポーズメニュー --- */
        #pause-menu { background: rgba(0,0,0,0.85); display: none; flex-direction: column; }

        /* UI */
        #stats { position: absolute; top: 20px; left: 20px; color: #dbd4a2; font-size: 14px; pointer-events: none; z-index: 100; }
        #stamina-bar { width: 120px; height: 3px; background: rgba(255,255,255,0.1); margin-top: 8px; }
        #stamina-fill { width: 100%; height: 100%; background: #dbd4a2; }
        #menu-open-btn { position: absolute; top: 20px; right: 20px; padding: 10px; color: #dbd4a2; background: rgba(0,0,0,0.3); border: 1px solid rgba(219,212,162,0.3); z-index: 300; }

        #mobile-ui { position: absolute; inset: 0; pointer-events: none; z-index: 200; }
        .joy-container { position: absolute; bottom: 50px; left: 50px; width: 130px; height: 130px; pointer-events: auto; }
        #joystick-base { width: 100%; height: 100%; background: rgba(255,255,255,0.03); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.08); }
        #joystick-stick { width: 55px; height: 55px; background: rgba(219,212,162,0.15); border-radius: 50%; }
        .btn { position: absolute; bottom: 40px; right: 40px; width: 85px; height: 85px; pointer-events: auto; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #dbd4a2; border-radius: 50%; font-weight: bold; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loader"></div>
        <div id="load-text">CONNECTING TO LIMINAL SPACE...</div>
    </div>

    <!-- ホーム画面 -->
    <div id="lock-overlay" class="overlay">
        <div class="title-container">
            <h1 class="main-title">THE<br>BACKROOMS</h1>
        </div>
        <div class="menu-options">
            <button class="home-btn" onclick="startApp()">START</button>
            <button class="home-btn" onclick="openHomeSettings()">SETTINGS</button>
        </div>

        <!-- ホーム用設定パネル -->
        <div id="home-settings" class="settings-panel">
            <h2>SETTINGS</h2>
            <div class="setting-row">
                AMBIENT HUM: <span class="vol-txt">50</span>%
                <input type="range" class="vol-slider" min="0" max="100" value="50">
            </div>
            <button class="home-btn" style="width:100%; font-size:12px;" onclick="closeHomeSettings()">BACK</button>
        </div>
    </div>

    <!-- ポーズメニュー -->
    <div id="pause-menu" class="overlay">
        <div class="settings-panel" style="display:block; position:relative;">
            <h2>PAUSED</h2>
            <div class="setting-row">
                AMBIENT HUM: <span class="vol-txt">50</span>%
                <input type="range" class="vol-slider" min="0" max="100" value="50">
            </div>
            <button class="home-btn" style="width:100%; margin-bottom:10px;" onclick="resumeGame()">RESUME</button>
            <button class="home-btn" style="width:100%; font-size:12px;" onclick="location.reload()">QUIT</button>
        </div>
    </div>
    
    <div id="stats">LEVEL 0<div id="stamina-bar"><div id="stamina-fill"></div></div></div>
    <button id="menu-open-btn" onclick="toggleMenu()">MENU</button>

    <div id="mobile-ui">
        <div class="joy-container"><div id="joystick-base"><div id="joystick-stick"></div></div></div>
        <div class="btn" id="btn-shift">RUN</div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a0d);
        scene.fog = new THREE.Fog(0x1a1a0d, 2, 12);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 25);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const listener = new THREE.AudioListener();
        camera.add(listener);
        const humSound = new THREE.Audio(listener);
        const audioLoader = new THREE.AudioLoader();
        
        let isPaused = false, isGameStarted = false;
        let humLoaded = false;

        audioLoader.load('hum.mp3', (buffer) => {
            humSound.setBuffer(buffer);
            humSound.setLoop(true);
            humSound.setVolume(0.5);
            humLoaded = true;
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('lock-overlay').style.display = 'flex';
        });

        // 設定の連動処理
        const sliders = document.querySelectorAll('.vol-slider');
        const volTxts = document.querySelectorAll('.vol-txt');
        sliders.forEach(s => {
            s.addEventListener('input', (e) => {
                const val = e.target.value;
                sliders.forEach(other => other.value = val);
                volTxts.forEach(t => t.textContent = val);
                if(humSound.buffer) humSound.setVolume(val / 100);
            });
        });

        window.openHomeSettings = () => document.getElementById('home-settings').style.display = 'block';
        window.closeHomeSettings = () => document.getElementById('home-settings').style.display = 'none';

        window.startApp = () => {
            document.getElementById('lock-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('lock-overlay').style.display = 'none';
                if (listener.context.state === 'suspended') listener.context.resume();
                isGameStarted = true;
                humSound.play();
                renderer.domElement.requestPointerLock();
            }, 500);
        };

        window.toggleMenu = () => {
            if (!isGameStarted) return;
            isPaused = !isPaused;
            document.getElementById('pause-menu').style.display = isPaused ? 'flex' : 'none';
            if (!isPaused) renderer.domElement.requestPointerLock();
            else document.exitPointerLock();
        };

        window.resumeGame = () => {
            isPaused = false;
            document.getElementById('pause-menu').style.display = 'none';
            renderer.domElement.requestPointerLock();
        };

        // --- 簡易ゲームエンジン部分 ---
        const player = { pos: new THREE.Vector3(0, 0, 0), rot: { x: 0, y: 0 }, stamina: 100 };
        const keys = {};
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        
        document.addEventListener('mousemove', (e) => { 
            if (document.pointerLockElement === renderer.domElement && !isPaused) { 
                player.rot.y -= e.movementX * 0.002; 
                player.rot.x = Math.max(-1.4, Math.min(1.4, player.rot.x - e.movementY * 0.002)); 
            } 
        });

        const wallMat = new THREE.MeshStandardMaterial({ color: 0x9b9161 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x7a724d });
        
        function createTile(tx, tz) {
            const group = new THREE.Group();
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(5, 5), floorMat);
            floor.rotation.x = -Math.PI/2; group.add(floor);
            const ceil = new THREE.Mesh(new THREE.PlaneGeometry(5, 5), wallMat);
            ceil.rotation.x = Math.PI/2; ceil.position.y = 3; group.add(ceil);
            group.position.set(tx * 5, 0, tz * 5);
            scene.add(group);
            return group;
        }

        const mapData = new Map();
        function animate() {
            requestAnimationFrame(animate);
            if (!isGameStarted || isPaused) return;

            let speed = keys['shift'] ? 0.12 : 0.07;
            if (keys['w']) {
                player.pos.x -= Math.sin(player.rot.y) * speed;
                player.pos.z -= Math.cos(player.rot.y) * speed;
            }
            
            camera.position.set(player.pos.x, 1.6, player.pos.z);
            camera.rotation.set(player.rot.x, player.rot.y, 0);

            const curTX = Math.round(player.pos.x / 5), curTZ = Math.round(player.pos.z / 5);
            for (let x = curTX - 3; x <= curTX + 3; x++) for (let z = curTZ - 3; z <= curTZ + 3; z++) {
                if (!mapData.has(`${x},${z}`)) mapData.set(`${x},${z}`, createTile(x, z));
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
