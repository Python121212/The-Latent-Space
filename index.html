<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Backrooms - Maze Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; user-select: none; }
        canvas { display: block; image-rendering: pixelated; }
        
        #loading-screen { position: fixed; inset: 0; background: #000; color: #dbd4a2; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .loader { width: 40px; height: 40px; border: 2px solid #333; border-top-color: #dbd4a2; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
        #lock-overlay { background: radial-gradient(circle, #2a2a1a 0%, #000 100%); color: #dbd4a2; flex-direction: column; border: 20px solid #000; }
        
        .main-title { font-size: clamp(32px, 8vw, 48px); font-weight: 900; letter-spacing: 10px; margin-bottom: 40px; color: #eee5a1; text-align: center; }
        .menu-options { display: flex; flex-direction: column; gap: 15px; width: 220px; }
        .home-btn { padding: 15px; background: rgba(42, 42, 26, 0.8); border: 1px solid #444; color: #dbd4a2; cursor: pointer; font-family: inherit; font-size: 16px; letter-spacing: 2px; }

        .settings-panel { display: none; position: absolute; width: 280px; padding: 25px; background: #1a1a0d; border: 1px solid #444; z-index: 100; }
        .setting-row { margin: 20px 0; font-size: 13px; }
        .quality-selector { display: flex; gap: 10px; margin-top: 8px; }
        .q-btn { flex: 1; padding: 8px; background: #2a2a1a; border: 1px solid #444; color: #888; cursor: pointer; }
        .q-btn.active { background: #dbd4a2; color: #000; }

        #pause-menu { background: rgba(0,0,0,0.85); display: none; }
        #stats { position: absolute; top: 20px; left: 20px; color: #dbd4a2; z-index: 100; }
        #menu-open-btn { position: absolute; top: 20px; right: 20px; padding: 10px; color: #dbd4a2; background: rgba(0,0,0,0.3); border: 1px solid #444; z-index: 300; }

        #mobile-ui { position: absolute; inset: 0; pointer-events: none; }
        .joy-container { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; pointer-events: auto; background: rgba(255,255,255,0.05); border-radius: 50%; }
        #joystick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(219,212,162,0.2); border-radius: 50%; }
        .btn-run { position: absolute; bottom: 40px; right: 40px; width: 80px; height: 80px; pointer-events: auto; background: rgba(255,255,255,0.05); border: 1px solid #444; color: #dbd4a2; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="loading-screen"><div class="loader"></div><div>INITIALIZING LEVEL 0...</div></div>

    <div id="lock-overlay" class="overlay">
        <h1 class="main-title">THE<br>BACKROOMS</h1>
        <div class="menu-options">
            <button class="home-btn" onclick="startApp()">START</button>
            <button class="home-btn" onclick="openHomeSettings()">SETTINGS</button>
        </div>
        <div id="home-settings" class="settings-panel">
            <h2>SETTINGS</h2>
            <div class="setting-row">QUALITY:
                <div class="quality-selector">
                    <button class="q-btn" onclick="setQuality(0.4, this)">LOW</button>
                    <button class="q-btn active" onclick="setQuality(1.0, this)">HIGH</button>
                </div>
            </div>
            <button class="home-btn" style="width:100%; margin-top:10px;" onclick="closeHomeSettings()">BACK</button>
        </div>
    </div>

    <div id="pause-menu" class="overlay">
        <div class="settings-panel" style="display:block; position:relative;">
            <h2>PAUSED</h2>
            <button class="home-btn" style="width:100%; margin-bottom:10px;" onclick="resumeGame()">RESUME</button>
            <button class="home-btn" style="width:100%;" onclick="location.reload()">QUIT</button>
        </div>
    </div>
    
    <div id="stats">LEVEL 0</div>
    <button id="menu-open-btn" onclick="toggleMenu()">MENU</button>

    <div id="mobile-ui">
        <div class="joy-container"><div id="joystick"></div></div>
        <div class="btn-run" id="btn-run">RUN</div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a0d);
        scene.fog = new THREE.Fog(0x1a1a0d, 1, 12);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 50);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambient);
        const light = new THREE.PointLight(0xfff0aa, 2, 12);
        scene.add(light);

        let isPaused = false, isGameStarted = false;
        const mapData = new Map();
        const player = { pos: new THREE.Vector3(0, 1.6, 0), rot: { x: 0, y: 0 } };

        // 素材
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x9b9161 }); // 黄ばんだ壁の色
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x7a724d }); // 汚れたカーペットの色

        function createTile(tx, tz) {
            const group = new THREE.Group();
            
            // 床
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(5, 5), floorMat);
            floor.rotation.x = -Math.PI/2;
            group.add(floor);
            
            // 天井
            const ceil = new THREE.Mesh(new THREE.PlaneGeometry(5, 5), wallMat);
            ceil.rotation.x = Math.PI/2; ceil.position.y = 3;
            group.add(ceil);

            // 壁の生成（ランダム）
            // プレイヤーの初期位置（0,0）の周りには壁を作らない
            if (Math.abs(tx) > 1 || Math.abs(tz) > 1) {
                const wallGeo = new THREE.BoxGeometry(5, 3, 0.2);
                if (Math.random() > 0.7) { // 北側に壁
                    const w = new THREE.Mesh(wallGeo, wallMat);
                    w.position.set(0, 1.5, -2.4);
                    group.add(w);
                }
                if (Math.random() > 0.7) { // 東側に壁
                    const w = new THREE.Mesh(wallGeo, wallMat);
                    w.rotation.y = Math.PI/2;
                    w.position.set(2.4, 1.5, 0);
                    group.add(w);
                }
            }

            group.position.set(tx * 5, 0, tz * 5);
            scene.add(group);
            return group;
        }

        function updateTiles() {
            const curTX = Math.round(player.pos.x / 5);
            const curTZ = Math.round(player.pos.z / 5);
            for (let x = curTX - 4; x <= curTX + 4; x++) {
                for (let z = curTZ - 4; z <= curTZ + 4; z++) {
                    if (!mapData.has(`${x},${z}`)) {
                        mapData.set(`${x},${z}`, createTile(x, z));
                    }
                }
            }
        }

        // 初期表示
        document.getElementById('loading-screen').style.display = 'none';

        window.startApp = () => {
            document.getElementById('lock-overlay').style.display = 'none';
            isGameStarted = true;
            renderer.domElement.requestPointerLock();
            updateTiles();
        };

        window.setQuality = (scale, btn) => {
            renderer.setPixelRatio(window.devicePixelRatio * scale);
            document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };

        window.openHomeSettings = () => document.getElementById('home-settings').style.display = 'block';
        window.closeHomeSettings = () => document.getElementById('home-settings').style.display = 'none';

        window.toggleMenu = () => {
            if (!isGameStarted) return;
            isPaused = !isPaused;
            document.getElementById('pause-menu').style.display = isPaused ? 'flex' : 'none';
        };

        window.resumeGame = () => {
            isPaused = false;
            document.getElementById('pause-menu').style.display = 'none';
            renderer.domElement.requestPointerLock();
        };

        // 操作系
        const keys = {};
        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
        document.onmousemove = (e) => {
            if (document.pointerLockElement && !isPaused) {
                player.rot.y -= e.movementX * 0.002;
                player.rot.x = Math.max(-1.4, Math.min(1.4, player.rot.x - e.movementY * 0.002));
            }
        };

        function animate() {
            requestAnimationFrame(animate);
            if (!isGameStarted || isPaused) return;

            const speed = keys['shift'] ? 0.12 : 0.06;
            if (keys['w']) {
                player.pos.x -= Math.sin(player.rot.y) * speed;
                player.pos.z -= Math.cos(player.rot.y) * speed;
            }
            if (keys['s']) {
                player.pos.x += Math.sin(player.rot.y) * speed;
                player.pos.z += Math.cos(player.rot.y) * speed;
            }

            camera.position.copy(player.pos);
            camera.rotation.set(player.rot.x, player.rot.y, 0);
            light.position.copy(player.pos);

            updateTiles();
            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
